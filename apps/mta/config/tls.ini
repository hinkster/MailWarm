# TLS configuration for Haraka
# Port 587 = STARTTLS (opportunistic upgrade)
# Port 465 = implicit TLS (SMTPS)

key=/etc/ssl/mailwarm/privkey.pem
cert=/etc/ssl/mailwarm/fullchain.pem

# Minimum TLS version
min_version=TLSv1_2

# Cipher preferences (Mozilla Modern profile)
ciphers=ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384

# Require STARTTLS before AUTH on port 587
requireTLS=true

# SMTPS listeners (port 465)
[outbound]
enable_tls=true
