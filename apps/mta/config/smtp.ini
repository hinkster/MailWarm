# Haraka SMTP server configuration
# Listens on 587 (STARTTLS/submission) and 465 (SMTPS/implicit TLS)
# Port 25 intentionally NOT used — Azure blocks outbound port 25

# Port 25  — inbound only (receiving replies from seed mailboxes)
#             Azure blocks outbound 25 but inbound is fine
# Port 587 — STARTTLS submission (API → Haraka → SES relay)
# Port 465 — SMTPS implicit TLS submission
listen=0.0.0.0:25,[::]:25,0.0.0.0:587,[::]:587,0.0.0.0:465,[::]:465

# SMTP greeting
me=mail.myownaimodel.ai

# Connection limits per IP (anti-abuse)
max_connections=100
nodes=cpus

# Queue configuration
queue_dir=/var/spool/haraka
max_retry_days=3
