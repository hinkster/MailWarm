# Dovecot configuration for MailWarm seed mailbox pool
# Handles IMAPS (993) for seed mailboxes and auto-reply triggering

# ── Network ────────────────────────────────────────────────────────────────────
protocols = imap
listen = *

# ── SSL/TLS ────────────────────────────────────────────────────────────────────
ssl = required
ssl_cert = </etc/ssl/dovecot/fullchain.pem
ssl_key = </etc/ssl/dovecot/privkey.pem
ssl_min_protocol = TLSv1.2
ssl_cipher_list = ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384

# ── Mail storage ───────────────────────────────────────────────────────────────
mail_location = maildir:/var/mail/%u/Maildir
mail_privileged_group = mail

# ── Authentication ─────────────────────────────────────────────────────────────
auth_mechanisms = plain login

# Separator between real username and master username: warm1@domain.com*masteruser
auth_master_user_separator = *

# Master-user passdb — checked first; allows the IMAP reply poller to
# authenticate as any mailbox without knowing individual passwords.
passdb {
  driver = passwd-file
  args = scheme=SHA512-CRYPT /etc/dovecot/master-passwd
  master = yes
  pass = yes
}

# Regular user passdb
passdb {
  driver = passwd-file
  args = scheme=SHA512-CRYPT /etc/dovecot/passwd
}

userdb {
  driver = static
  args = uid=vmail gid=vmail home=/var/mail/%u
}

# ── IMAP service ───────────────────────────────────────────────────────────────
service imap-login {
  inet_listener imaps {
    port = 993
    ssl = yes
  }
  # Disable plain IMAP (143) — we only use IMAPS
  inet_listener imap {
    port = 0
  }
}

service imap {
  executable = imap imap-postlogin
}

# ── Logging ────────────────────────────────────────────────────────────────────
log_path = /dev/stdout
info_log_path = /dev/stdout
debug_log_path = /dev/stdout
auth_verbose = yes

# ── Namespace ──────────────────────────────────────────────────────────────────
namespace inbox {
  inbox = yes
  separator = /
  mailbox Sent {
    auto = subscribe
    special_use = \Sent
  }
  mailbox Drafts {
    auto = subscribe
    special_use = \Drafts
  }
  mailbox Trash {
    auto = subscribe
    special_use = \Trash
  }
  mailbox Junk {
    auto = subscribe
    special_use = \Junk
  }
}

# ── LMTP (local delivery from Haraka) ─────────────────────────────────────────
protocols = $protocols lmtp

service lmtp {
  unix_listener /var/run/dovecot/lmtp {
    mode = 0600
    user = postfix
    group = postfix
  }
  inet_listener lmtp {
    port = 24
  }
}

# ── Sieve (server-side auto-reply filtering) ──────────────────────────────────
protocol lmtp {
  mail_plugins = $mail_plugins sieve
}

plugin {
  sieve = ~/.dovecot.sieve
  sieve_global_path = /etc/dovecot/sieve/default.sieve
}
